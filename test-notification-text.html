<!DOCTYPE html>
<html>
<head>
    <title>Test Custom Notification Text</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { margin: 10px; padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>Test Custom Notification Text</h1>
    
    <button onclick="testQueue1Notification()">Test Queue 1 Notification</button>
    <button onclick="testQueue2Notification()">Test Queue 2 Notification</button>
    <button onclick="testDefaultNotification()">Test Default Notification</button>
    
    <script>
        async function testQueue1Notification() {
            try {
                await chrome.runtime.sendMessage({
                    type: "TEST_NOTIFICATION",
                    ticketNumber: "INC0012345",
                    ticketDescription: "Test notification for Queue 1",
                    severity: "3",
                    customTitle: "New tickets in Queue 1"
                });
                console.log('Queue 1 test notification sent');
            } catch (error) {
                console.error('Error sending Queue 1 test notification:', error);
            }
        }
        
        async function testQueue2Notification() {
            try {
                await chrome.runtime.sendMessage({
                    type: "TEST_NOTIFICATION",
                    ticketNumber: "TASK0067890",
                    ticketDescription: "Test notification for Queue 2",
                    severity: "2",
                    customTitle: "Critical tickets in Queue 2"
                });
                console.log('Queue 2 test notification sent');
            } catch (error) {
                console.error('Error sending Queue 2 test notification:', error);
            }
        }
        
        async function testDefaultNotification() {
            try {
                await chrome.runtime.sendMessage({
                    type: "TEST_NOTIFICATION",
                    ticketNumber: "CHG0011122",
                    ticketDescription: "Test default notification format"
                });
                console.log('Default test notification sent');
            } catch (error) {
                console.error('Error sending default test notification:', error);
            }
        }
    </script>
</body>
</html>
